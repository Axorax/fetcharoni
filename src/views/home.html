<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fetcharoni</title>
    <link rel="shortcut icon" href="fetcharoni.ico" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>

    <main>
      <section class="section_input">

        <div class="dropdown">
          <button><p class="name">GET</p> <p class="arrow">▾</p></button>
          <ul>
            <li><button onclick="setMethod('GET')">GET</button></li>
            <li><button onclick="setMethod('POST')">POST</button></li>
            <li><button onclick="setMethod('PUT')">PUT</button></li>
            <li><button onclick="setMethod('PATCH')">PATCH</button></li>
            <li><button onclick="setMethod('DELETE')">DELETE</button></li>
          </ul>
        </div>

        <div class="input_wrapper">
          <input type="text" placeholder="Address" id="input" />
        </div>

        <div class="send_wrapper">
          <button id="send" onclick="send_request()">Send</button>
        </div>

      </section>

      <section class="section_tabs">

        <div class="tab">

          <div class="tab_panel">
            <button
              onclick="setTab('headers', this)"
              class="active"
            >Headers</button>
            <button onclick="setTab('body', this)">Body</button>
            <button onclick="setTab('options', this)">Options</button>
          </div>

          <div class="tab_fields">

            <div id="headers" class="active">
              <p class="curlies">headers: {</p>
              <div
                spellcheck="false"
                contenteditable="true"
                class="input-1"
                placeholder='"Authorization Token": "69",'
              ></div>
              <p class="curlies opposite">}</p>
            </div>

            <div id="body">
              <p class="curlies">body: {</p>
              <div
                spellcheck="false"
                contenteditable="true"
                class="input-1"
                placeholder='"cool link": "https://youtu.be/dQw4w9WgXcQ",'
              ></div>
              <p class="curlies opposite">}</p>
            </div>

            <div id="options">
              <p class="curlies">fetch('URL', {</p>
              <div
                spellcheck="false"
                contenteditable="true"
                class="input-1"
                placeholder='"mode": "no-cors",'
              ></div>
              <p class="curlies opposite">});</p>
            </div>

          </div>

        </div>

        <div class="tab">

          <div class="tab_panel">
            <button onclick="setTab('raw', this)" class="active">Raw</button>
            <button onclick="setTab('iframe', this)">iFrame</button>
            <button onclick="setTab('loadhtml', this)">Render</button>
            <button onclick="setTab('rawhtml', this)">HTML</button>
            <button onclick="setTab('outputheaders', this)">Headers</button>
          </div>

          <div class="tab_fields">
            <div id="raw" class="active">
              <div class="raw-content"></div>
            </div>
            <div id="iframe">
              <iframe frameborder="0" id="iframe-id"></iframe>
            </div>
            <div id="loadhtml">
              <iframe frameborder="0" id="load-html"></iframe>
            </div>
            <div id="rawhtml">
              <iframe frameborder="0" id="rawhtml-load"></iframe>
            </div>
            <div id="outputheaders">
              <div class="input-1 normal"></div>
            </div>
          </div>

        </div>
      </section>

      <section class="section_info">
        <div class="info">
          <a
            class="donate"
            href="https://www.patreon.com/axorax"
            target="_blank"
          ><svg
              xmlns="http://www.w3.org/2000/svg"
              height="24"
              viewBox="0 -960 960 960"
              width="24"
            ><path
                d="m480-120-58-52q-101-91-167-157T150-447.5Q111-500 95.5-544T80-634q0-94 63-157t157-63q52 0 99 22t81 62q34-40 81-62t99-22q94 0 157 63t63 157q0 46-15.5 90T810-447.5Q771-395 705-329T538-172l-58 52Z"
              /></svg></a>
          <p class="status-p">v1.0.0</p>
        </div>
      </section>
    </main>
  </body>
</html>
